name: Release Canary

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release Dev"]
    types: [completed]

permissions:
  actions: read
  contents: read

defaults:
  run:
    shell: bash

jobs:
  macos:
    name: macOS Homebrew
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-latest-xlarge
    timeout-minutes: 30
    env:
      OPENSHELL_PROVISION_TIMEOUT: "600"
    steps:
      - name: Ensure VM driver
        run: |
          launchctl setenv OPENSHELL_DRIVERS vm

      - name: Install VM driver dependencies
        run: |
          set -euo pipefail
          brew install e2fsprogs
          E2FS_PREFIX="$(brew --prefix e2fsprogs)"
          if ! [ -x "${E2FS_PREFIX}/sbin/mkfs.ext4" ] && ! [ -x "${E2FS_PREFIX}/bin/mkfs.ext4" ]; then
            echo "mkfs.ext4 was not installed by e2fsprogs." >&2
            exit 1
          fi
          if ! [ -x "${E2FS_PREFIX}/sbin/debugfs" ] && ! [ -x "${E2FS_PREFIX}/bin/debugfs" ]; then
            echo "debugfs was not installed by e2fsprogs." >&2
            exit 1
          fi

      - name: Install and check status
        run: |
          set -euo pipefail
          curl -LsSf https://raw.githubusercontent.com/NVIDIA/OpenShell/${{ github.event.workflow_run.head_sha || github.sha }}/install.sh | sh
          openshell status

      - name: Create sandbox and verify default-deny egress
        run: |
          set -euo pipefail
          SANDBOX="release-canary-${GITHUB_RUN_ID}"
          TMP_DIR="$(mktemp -d)"

          cleanup() {
            local exit_status=$?
            rm -rf "$TMP_DIR" || true
            return "$exit_status"
          }
          trap cleanup EXIT

          set +e
          openshell sandbox create \
            --name "$SANDBOX" \
            --from base \
            --no-auto-providers \
            --no-tty \
            -- curl -sS https://api.github.com/zen > "${TMP_DIR}/curl.out" 2>&1
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Expected sandbox create to run a curl command blocked by default-deny egress, but curl succeeded." >&2
            exit 1
          fi

          for attempt in 1 2 3 4 5; do
            openshell logs "$SANDBOX" --since 10m --source sandbox > "${TMP_DIR}/sandbox-logs.out" 2>&1 || true
            if grep -Eiq 'DENIED .*curl.*api[.]github[.]com' "${TMP_DIR}/sandbox-logs.out"; then
              echo "Confirmed default-deny egress denial in sandbox logs."
              if openshell sandbox delete "$SANDBOX"; then
                echo "Deleted sandbox $SANDBOX."
                exit 0
              fi
              echo "Confirmed denial, but failed to delete sandbox $SANDBOX." >&2
              exit 1
            fi
            if [ "$attempt" -lt 5 ]; then
              sleep 1
            fi
          done

          echo "Sandbox create returned nonzero, but sandbox logs did not show the expected DENIED curl event for api.github.com." >&2
          exit 1

      - name: Diagnostics on failure
        if: failure()
        run: |
          set +e
          SANDBOX="release-canary-${GITHUB_RUN_ID}"

          echo "--- openshell status ---"
          openshell status
          echo "--- openshell sandbox list ---"
          openshell sandbox list
          echo "--- openshell logs ---"
          openshell logs "$SANDBOX" --since 10m --source sandbox
          echo "--- brew services info ---"
          brew services info nvidia/openshell/openshell

          for log in \
            /opt/homebrew/var/log/openshell/openshell-gateway.err.log \
            /opt/homebrew/var/log/openshell/openshell-gateway.out.log; do
            echo "--- ${log} ---"
            tail -200 "$log" 2>/dev/null || true
          done

          echo "--- cleanup sandbox ---"
          openshell sandbox delete "$SANDBOX" || true

  ubuntu:
    name: Ubuntu Docker
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Ensure Docker
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi
          sudo systemctl start docker || sudo service docker start
          mkdir -p "${HOME}/.config/openshell"
          printf 'OPENSHELL_DRIVERS=docker\n' > "${HOME}/.config/openshell/gateway.env"
          docker info

      - name: Install and check status
        run: |
          curl -LsSf https://raw.githubusercontent.com/NVIDIA/OpenShell/${{ github.event.workflow_run.head_sha || github.sha }}/install.sh | sh
          openshell status

  fedora:
    name: Fedora RPM
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: linux-amd64-cpu8
    timeout-minutes: 20
    container:
      image: fedora:latest
      options: --privileged
    steps:
      - name: Ensure Podman
        run: |
          dnf install -y curl podman
          mkdir -p "${HOME}/.config/openshell"
          printf 'OPENSHELL_DRIVERS=podman\n' > "${HOME}/.config/openshell/gateway.env"
          podman info

      - name: Install and check status
        run: |
          curl -LsSf https://raw.githubusercontent.com/NVIDIA/OpenShell/${{ github.event.workflow_run.head_sha || github.sha }}/install.sh | sh
          openshell status

  ubuntu-snap:
    name: Ubuntu Snap
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install snapd
        run: |
          sudo apt-get update
          sudo apt-get install -y snapd
          sudo systemctl start snapd

      - name: Install Docker snap
        run: |
          sudo snap install docker

      - name: Download snap from release-dev artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          run-id: ${{ github.event.workflow_run.id }}
          pattern: snap-linux-amd64
          path: release/

      - name: Install snap (dangerous — from release, not store)
        run: |
          sudo snap install ./release/*.snap --dangerous

      - name: Connect interfaces
        run: |
          sudo snap connect openshell:docker docker:docker-daemon
          sudo snap connect openshell:log-observe
          sudo snap connect openshell:system-observe
          sudo snap connect openshell:ssh-keys

      - name: Check status
        run: |
          openshell status

  kubernetes:
    name: Kubernetes Helm (kind)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      KIND_CLUSTER_NAME: release-canary-${{ github.run_id }}
      RELEASE_NAME: openshell
      RELEASE_NAMESPACE: openshell
      KIND_GATEWAY_NAME: kind
    steps:
      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          wait: 120s

      - name: Install OpenShell Helm chart from GHCR OCI
        run: |
          set -euo pipefail
          helm install "$RELEASE_NAME" oci://ghcr.io/nvidia/openshell/helm-chart \
            --version 0.0.0-dev \
            --namespace "$RELEASE_NAMESPACE" --create-namespace \
            --set server.disableTls=true \
            --wait --timeout 5m

      - name: Verify gateway pod is Ready
        run: |
          set -euo pipefail
          kubectl wait --namespace "$RELEASE_NAMESPACE" \
            --for=condition=Ready pod \
            --selector="app.kubernetes.io/name=openshell,app.kubernetes.io/instance=${RELEASE_NAME}" \
            --timeout=300s

      - name: Port-forward gateway service
        run: |
          set -euo pipefail
          nohup kubectl port-forward --namespace "$RELEASE_NAMESPACE" \
            "svc/${RELEASE_NAME}" 8080:8080 \
            > port-forward.log 2>&1 &
          echo $! > port-forward.pid
          for _ in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/8080) >/dev/null 2>&1; then
              echo "port-forward is reachable"
              exit 0
            fi
            sleep 1
          done
          echo "port-forward did not become reachable" >&2
          cat port-forward.log >&2
          exit 1

      - name: Install OpenShell CLI
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.config/openshell"
          printf 'OPENSHELL_DRIVERS=docker\n' > "${HOME}/.config/openshell/gateway.env"
          curl -LsSf https://raw.githubusercontent.com/NVIDIA/OpenShell/${{ github.event.workflow_run.head_sha || github.sha }}/install.sh | sh

      - name: Register kind gateway and check status
        run: |
          set -euo pipefail
          openshell gateway add http://127.0.0.1:8080 --local --name "$KIND_GATEWAY_NAME"
          openshell status

      - name: Diagnostics on failure
        if: failure()
        run: |
          set +e
          echo "--- helm status ---"
          helm status "$RELEASE_NAME" --namespace "$RELEASE_NAMESPACE"
          echo "--- helm get manifest ---"
          helm get manifest "$RELEASE_NAME" --namespace "$RELEASE_NAMESPACE"
          echo "--- get all ---"
          kubectl get all --namespace "$RELEASE_NAMESPACE"
          echo "--- describe pods ---"
          kubectl describe pods --namespace "$RELEASE_NAMESPACE"
          echo "--- pod logs ---"
          kubectl logs --namespace "$RELEASE_NAMESPACE" \
            --selector="app.kubernetes.io/name=openshell,app.kubernetes.io/instance=${RELEASE_NAME}" \
            --tail=200 --all-containers --prefix
          echo "--- port-forward log ---"
          cat port-forward.log 2>/dev/null
          echo "--- openshell gateway list ---"
          openshell gateway list 2>/dev/null
          echo "--- openshell version ---"
          openshell --version 2>/dev/null
