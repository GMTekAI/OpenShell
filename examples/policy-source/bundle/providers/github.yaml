id: github
display_name: GitHub
description: Governed GitHub provider profile served by the policy source.
credentials:
  - name: token
    env_vars: [GITHUB_TOKEN]
    required: true
    auth_style: bearer
    header_name: authorization
    token_grant:
      token_endpoint: https://auth.example.com/token
      audience: github
      scopes: [repo]
