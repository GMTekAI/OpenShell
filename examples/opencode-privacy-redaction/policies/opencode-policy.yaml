version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /home
    - /root
    # PTY allocation for the opencode TUI / web terminal and bash tool.
    # /dev/ptmx is a symlink into pts/ptmx, so granting the devpts mount covers it.
    - /dev/pts

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  # opencode runtime egress. inference.local is ALWAYS reachable regardless of
  # network policy (the supervisor routes it), so it is intentionally absent here.
  opencode_runtime:
    name: opencode_runtime
    endpoints:
      # Redact MCP server, running on the host (same host as the inference proxy),
      # reached from inside the sandbox via the host alias on its HTTP port.
      - { host: host.openshell.internal, port: 8001 }
      # opencode fetches the openai-compatible provider SDK (@ai-sdk/openai-compatible)
      # and the models.dev metadata snapshot on first run.
      - { host: registry.npmjs.org, port: 443 }
      - { host: "*.npmjs.org", port: 443 }
      - { host: models.dev, port: 443 }
      # `opencode web` serves its SPA front-end from app.opencode.ai. Without this
      # the local web server returns 403 (egress proxy denies the asset fetch).
      - { host: app.opencode.ai, port: 443 }
    binaries:
      - { path: "**" }

  # Weather data sources for the demo task ("check the weather"). Bound to the
  # opencode runtime binary (matches how these were approved interactively).
  weather_forecast:
    name: weather_forecast
    endpoints:
      - { host: api.met.no, port: 443 }
      - { host: api.open-meteo.com, port: 443 }
      - { host: api.weather.gov, port: 443 }
      - { host: aviationweather.gov, port: 443 }
      - { host: dd.weather.gc.ca, port: 443 }
      - { host: tgftp.nws.noaa.gov, port: 443 }
      - { host: weather.gc.ca, port: 443 }
      - { host: wttr.in, port: 443 }
      - { host: www.timeanddate.com, port: 443 }
    binaries:
      - { path: /usr/lib/node_modules/opencode-ai/bin/.opencode }
