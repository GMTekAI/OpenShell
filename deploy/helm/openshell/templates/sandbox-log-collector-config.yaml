{{- $logCollection := .Values.server.sandboxLogCollection | default dict -}}
{{- $sidecar := $logCollection.sidecar | default dict -}}
{{- $configMap := $sidecar.configMap | default dict -}}
{{- if and ($logCollection.enabled | default false) ($sidecar.enabled | default false) ($configMap.create | default false) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openshell.sandboxLogCollectorConfigMapName" . }}
  namespace: {{ include "openshell.sandboxNamespace" . }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
data:
  {{ $configMap.key | default "config.yaml" }}: |
    {{- $configMap.contents | default "" | nindent 4 }}
{{- end }}
